version: "2"

linters:
  default: none
  enable:
    - bodyclose
    - dogsled
    - errcheck
    - gochecknoinits
    - goconst
    - gocritic
    - gocyclo
    - goprintffuncname
    - gosec
    - govet
    - ineffassign
    - misspell
    - nakedret
    - rowserrcheck
    - staticcheck
    - unconvert
    - unparam
    - unused
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - funlen
          - goconst
          - gosec

formatters:
  enable:
    - gofmt
    - goimports
