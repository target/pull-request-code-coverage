name: pull-request-checks

on:
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: 1.26.3

    - name: Build
      run: go build -v ./...

    - name: Test
      run: go test -v ./...

    - name: check-format-on-pr
      run: make format

    - name: check-lint-on-pr
      run: make lint
